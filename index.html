<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css?v=25">
  <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Poppins" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
  <title>Interactive Cyber Defense Matrix</title>
</head>
<body>
  <div id="appLayout">

    <!-- ── Left sidebar: Technology Selector ── -->
    <aside id="techSidebar">
      <div class="sidebar-header">Technologies</div>
      <div id="techSidebarContent" class="sidebar-scroll"></div>
    </aside>

    <!-- ── Main content ── -->
    <div id="mainContainer">

      <!-- CDM Grid + Solution Overlays -->
      <div id="gridWrapper" class="grid-wrapper">
        <button id="screenshotBtn" class="screenshot-btn" title="Copy grid screenshot to clipboard">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
        </button>
        <table class="cdm-grid" id="cdmGrid">
          <thead></thead>
          <tbody></tbody>
        </table>
        <div id="solutionOverlays"></div>
      </div>

      <!-- Title area (carrier name + questions, or TTP stats) -->
      <div id="carrierTitle" class="carrier-title"></div>

      <!-- Controls panel with tabs -->
      <div id="controlsPanel">
        <!-- Tab buttons -->
        <div class="tab-buttons">
          <button id="tab-carriers" class="tab-btn tab-btn-active">Cyber Insurance Applications</button>
          <button id="tab-threats" class="tab-btn">Threat TTPs</button>
        </div>

        <!-- Controls row: left side is tab-specific, right side is shared (counts + clear) -->
        <div class="controls-row">
          <!-- TTP-specific controls (year buttons + incidents/campaigns toggle) — hidden when carriers tab active -->
          <div id="ttp-controls" class="ttp-controls" style="display:none;">
            <button class="year-btn year-btn-active" data-year="ALL">ALL</button>
            <button class="year-btn" data-year="2021">2021</button>
            <button class="year-btn" data-year="2022">2022</button>
            <button class="year-btn" data-year="2023">2023</button>
            <button class="year-btn" data-year="2024">2024</button>
            <button class="year-btn" data-year="2025">2025</button>
            <span class="ttp-divider"></span>
            <div class="counts-segmented">
              <button id="countsModeIncidents" class="counts-seg-btn counts-seg-incidents counts-seg-active">Incidents</button>
              <button id="countsModesCampaigns" class="counts-seg-btn counts-seg-campaigns">Campaigns</button>
            </div>
          </div>

          <!-- Cell filter tag (inline, hidden by default) -->
          <div id="ttpCellFilter" class="ttp-cell-filter" style="display: none;">
            <span id="ttpCellFilterText"></span>
            <button id="ttpCellFilterClear" class="ttp-filter-clear">&times;</button>
          </div>

          <!-- Spacer pushes shared controls right -->
          <div class="controls-spacer"></div>

          <!-- Shared: counts toggle + clear -->
          <div class="toggle-counts-wrapper">
            <span class="toggle-counts-label off">OFF</span>
            <label class="toggle-switch">
              <input type="checkbox" id="countsToggle" checked>
              <span class="toggle-slider"></span>
            </label>
            <span class="toggle-counts-label on">Counts</span>
          </div>
          <button class="toggle-clear-btn btn-clear" title="Clear grid">&times;</button>
        </div>

        <!-- Tab 1: All Carriers -->
        <div id="tab-panel-carriers" class="tab-panel tab-panel-active">
          <div class="carrier-grid">
            <button class="toggle-carrier_1-dataset-btn btn-carrier">Carrier 1</button>
            <button class="toggle-carrier_2-dataset-btn btn-carrier">Carrier 2</button>
            <button class="toggle-carrier_3-dataset-btn btn-carrier">Carrier 3</button>
            <button class="toggle-carrier_4-dataset-btn btn-carrier">Carrier 4</button>
            <button class="toggle-carrier_5-dataset-btn btn-carrier">Carrier 5</button>
            <button class="toggle-carrier_6-dataset-btn btn-carrier">Carrier 6</button>
            <button class="toggle-carrier_7-dataset-btn btn-carrier">Carrier 7</button>
            <button class="toggle-carrier_8-dataset-btn btn-carrier">Carrier 8</button>
            <button class="toggle-carrier_9-dataset-btn btn-carrier">Carrier 9</button>
            <button class="toggle-carrier_10-dataset-btn btn-carrier">Carrier 10</button>
            <button class="toggle-carrier_11-dataset-btn btn-carrier">Carrier 11</button>
            <button class="toggle-carrier_12-dataset-btn btn-carrier">Carrier 12</button>
            <button class="toggle-carrier_13-dataset-btn btn-carrier">Carrier 13</button>
            <button class="toggle-carrier_14-dataset-btn btn-carrier">Carrier 14</button>
            <button class="toggle-carrier_15-dataset-btn btn-carrier">Carrier 15</button>
            <button class="toggle-carrier_16-dataset-btn btn-carrier">Carrier 16</button>
            <button class="toggle-carrier_17-dataset-btn btn-carrier">Carrier 17</button>
            <button class="toggle-carrier_18-dataset-btn btn-carrier">Carrier 18</button>
            <button class="toggle-carrier_19-dataset-btn btn-carrier">Carrier 19</button>
            <button class="toggle-carrier_20-dataset-btn btn-carrier">Carrier 20</button>
            <button class="toggle-carrier_21-dataset-btn btn-carrier">Carrier 21</button>
            <button class="toggle-carrier_22-dataset-btn btn-carrier">Carrier 22</button>
          </div>
        </div>

        <!-- Tab 2: Threat TTPs -->
        <div id="tab-panel-threats" class="tab-panel">
          <div class="ttp-search-wrapper">
            <input type="text" id="ttpSearchInput" placeholder="Filter by ATT&CK ID or name..." class="ttp-search-input">
          </div>

          <div class="ttp-table-wrapper">
            <table class="ttp-table" id="ttpTable">
              <thead>
                <tr>
                  <th class="th-ttp-id" data-col="0">ATT&CK ID</th>
                  <th class="th-ttp-name" data-col="1">Name</th>
                  <th class="th-ttp-count" data-col="2"><span id="ttp-col-header">Incidents</span></th>
                  <th class="th-ttp-cells" data-col="3">CDM Mapping</th>
                </tr>
              </thead>
              <tbody id="ttpTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>
  <script src="script.js?v=25"></script>
</body>
</html>
